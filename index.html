<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MainsMate — CSE 2026 Model Answers</title>
<meta name="theme-color" content="#101319">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="app.css">
</head>
<body>

<header class="topbar">
  <button class="back" id="back" aria-label="Back">‹</button>
  <button class="icon" id="btn-sb" aria-label="Question list" title="Questions in this paper">☰</button>
  <div class="brand"><b>MainsMate</b><span>CSE 2026 · model answers</span></div>
  <div class="spacer"></div>
  <button class="icon" id="btn-theme" aria-label="Toggle day / night" title="Day / night theme">☾</button>
  <button class="smartkey" id="key-home" aria-label="Go home" title="Home (shortcut 1)"><span class="nav-icon home-icon" aria-hidden="true"></span><span>Home</span></button>
  <button class="smartkey" id="key-subject" aria-label="Go to current subject" title="Subject (shortcut 2)"><span class="nav-icon subject-icon" aria-hidden="true"></span><span>Subject</span></button>
</header>

<main id="view-home" class="view">
  <div class="countdown" id="countdown"></div>
  <div class="papers" id="papers"></div>
  <button class="notes-cta" id="go-notes">
    <span class="ic">📚</span>
    <span class="nm"><b>Notes library</b><small id="notes-sub">Mains Smasher notes, by paper</small></span>
    <span class="arw">›</span>
  </button>
</main>

<main id="view-list" class="view">
  <h1 id="list-title"></h1>
  <div class="filters">
    <input id="q-search" type="search" placeholder="Search questions &amp; keywords…" autocomplete="off">
    <div class="chips" id="tier-chips">
      <button class="chip" data-tier="all" aria-pressed="true">All</button>
      <button class="chip t1" data-tier="1">T1</button>
      <button class="chip t2" data-tier="2">T2</button>
      <button class="chip t3" data-tier="3">T3</button>
      <button class="chip todo" data-tier="todo">○ Not written</button>
      <button class="chip undone" data-tier="undone">◍ Not completed</button>
      <button class="chip done" data-tier="done">✓ Completed</button>
    </div>
    <select id="theme-sel" aria-label="Filter by theme"></select>
  </div>
  <div id="q-list"></div>
</main>

<main id="view-notes" class="view">
  <h1>📚 Notes library</h1>
  <input id="n-search" type="search" placeholder="Search all notes…" autocomplete="off">
  <div id="n-results" hidden></div>
  <div id="n-books"></div>
</main>

<main id="view-book" class="view">
  <h1 id="book-title"></h1>
  <div id="book-chapters"></div>
</main>

<main id="view-chapter" class="view">
  <div class="ch-head">
    <h1 id="ch-title"></h1>
    <div id="ch-meta"></div>
  </div>
  <div id="ch-pyq"></div>
  <div id="ch-outline"></div>
  <div id="ch-text" class="note-doc"></div>
</main>

<main id="view-answer" class="view">
  <div class="modebar">
    <div class="modes" id="modes">
      <button class="mode" data-mode="full" title="The full model answer, in full">Model Answer</button>
      <button class="mode" data-mode="scan" title="Skeleton for 60-second recall">Scan</button>
    </div>
    <select id="answer-theme" aria-label="Filter answer navigation by theme" title="Limit Previous/Next to one theme"></select>
    <button class="icon" id="btn-size" title="Reading size" aria-label="Change reading size">Aa</button>
    <button class="branch-toggle on" id="branch-read-toggle" type="button" aria-pressed="true" title="Read branch answers before the next main question" hidden>
      <span class="message-icon" aria-hidden="true"></span>
      <span class="branch-badge" id="branch-count">0</span>
      <span class="branch-label">Branches On</span>
    </button>
    <button class="read-toggle" id="btn-read" type="button" aria-pressed="false" title="Read the full answer aloud and continue to the next question">
      <span aria-hidden="true">◉</span> Read Along</button>
  </div>
  <div class="read-status" id="read-status" role="status" aria-live="polite" hidden>
    <span class="read-pulse" aria-hidden="true"></span>
    <span id="read-status-text">Reading</span>
    <button id="read-pause" type="button" aria-pressed="false" title="Pause or resume Read Along (Spacebar)" hidden>❚❚ Pause</button>
    <button id="read-skip" type="button">Next question</button>
    <button id="read-details-toggle" type="button" aria-expanded="false" title="Show detailed Read Along timing and settings" hidden>
      <span>Paper</span><progress id="read-paper-summary-progress" value="0" max="100" aria-label="Whole paper progress">0%</progress><time id="read-paper-summary-remaining">0:00</time><span aria-hidden="true" class="detail-caret">⌄</span>
    </button>
    <div class="read-details-panel" id="read-details-panel" hidden>
    <div class="read-progress-wrap" id="read-progress-wrap">
      <div class="read-time-head"><time id="read-elapsed">Elapsed 0:00</time><span>Estimated time remaining</span></div>
      <div class="read-time-row question-time"><span>Question</span><progress id="read-progress" value="0" max="100" aria-label="Question narration progress">0%</progress><time id="read-remaining">0:00</time></div>
      <div class="read-time-row section-time"><span>Subject</span><progress id="read-section-progress" value="0" max="100" aria-label="Current subject section progress">0%</progress><time id="read-section-remaining">0:00</time></div>
      <div class="read-time-row paper-time"><span>Paper</span><progress id="read-paper-progress" value="0" max="100" aria-label="Whole paper progress">0%</progress><time id="read-paper-remaining">0:00</time></div>
    </div>
    <div class="read-controls" id="read-controls">
      <label>
        <span>Voice</span>
        <select id="read-voice" aria-label="Read Along voice"></select>
      </label>
      <label>
        <span>Speed</span>
        <select id="read-speed" aria-label="Read Along speed">
          <option value="0.75">0.75×</option>
          <option value="0.9">0.9×</option>
          <option value="1">1×</option>
          <option value="1.15">1.15×</option>
          <option value="1.3">1.3×</option>
        </select>
      </label>
      <span class="read-hint">Tap a line to read from there · ↑↓ move line · Spacebar pauses.</span>
    </div>
    </div>
  </div>
  <button id="sb-backdrop" aria-label="Close question list" tabindex="-1"></button>
  <aside id="sidebar" aria-label="Questions in this paper">
    <div class="sb-head">
      <div><b id="sb-title">Paper</b><span id="sb-progress"></span></div>
      <button id="sb-pin" aria-label="Close question list" title="Close question list">×</button>
    </div>
    <label class="sb-search"><span aria-hidden="true">⌕</span><input id="sb-search" type="search" placeholder="Find a question or keyword" aria-label="Search this paper"></label>
    <div id="sb-list"></div>
  </aside>
  <article id="answer"></article>
  <div class="done-wrap">
    <button id="btn-done">Mark as completed</button>
  </div>
</main>

<nav class="app-dock" id="app-dock" aria-label="App navigation">
  <button data-dock="home"><span class="nav-icon home-icon" aria-hidden="true"></span><small>Home</small></button>
  <button data-dock="subject"><span class="nav-icon subject-icon" aria-hidden="true"></span><small>Subject</small></button>
  <button data-dock="previous" disabled><span class="nav-icon arrow-icon previous-icon" aria-hidden="true"></span><small>Previous</small></button>
  <button data-dock="next"><span class="nav-icon arrow-icon next-icon" aria-hidden="true"></span><small>Next</small></button>
</nav>

<script type="module" src="js/app.js"></script>
</body>
</html>
